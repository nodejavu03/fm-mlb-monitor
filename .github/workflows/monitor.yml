name: FMKorea MLB Monitor

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: seen_posts.json
          key: seen-posts-${{ github.run_id }}
          restore-keys: |
            seen-posts-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 cloudscraper
        
      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FM_PHPSESSID: ${{ secrets.FM_PHPSESSID }}
          FM_FSK: ${{ secrets.FM_FSK }}
        run: python monitor.py
